<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
</head>
<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #ffe6f0, #e6f7ff, #f3e5f5);
}

/* TITLE */
h1 {
    text-align: center;
    color: #6a5af9;
    margin-top: 30px;
}

/* FORM CONTAINER */
form {
    width: 45%;
    margin: 30px auto;
    background: white;
    padding: 30px;
    border-radius: 18px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    transition: 0.3s;
}

form:hover {
    transform: translateY(-3px);
}

/* INPUT FIELDS */
input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-family: inherit;
    outline: none;
}

input:focus, textarea:focus, select:focus {
    border: 1px solid #6a5af9;
}

/* BUTTON */
button {
    width: 100%;
    background: linear-gradient(90deg, #ff4d6d, #6a5af9);
    color: white;
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    opacity: 0.9;
}

/* BACK LINK */
a {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: #ff4d6d;
    text-decoration: none;
    font-weight: 500;
}
</style>
<body>

    <h1>Edit Profile</h1>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Save Changes
        </button>
    </form>

    <br>

    <a href="{% url 'profile' request.user.id %}">
        Back to Profile
    </a>

</body>
</html>
